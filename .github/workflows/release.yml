name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

jobs:
  release:
    name: Build and attach artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO and pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Build firmware
        run: pio run -e esp32dev

      - name: Build LittleFS image
        run: pio run -e esp32dev -t buildfs

      - name: Stage release artifacts
        id: stage
        run: |
          set -euo pipefail
          BUILD_DIR=.pio/build/esp32dev
          OUT=release
          mkdir -p "$OUT"

          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          cp "$BUILD_DIR/firmware.bin"   "$OUT/openlitter-${TAG}-firmware.bin"
          cp "$BUILD_DIR/littlefs.bin"   "$OUT/openlitter-${TAG}-littlefs.bin"
          cp "$BUILD_DIR/bootloader.bin" "$OUT/openlitter-${TAG}-bootloader.bin" 2>/dev/null || true
          cp "$BUILD_DIR/partitions.bin" "$OUT/openlitter-${TAG}-partitions.bin" 2>/dev/null || true

          # Generate SHA-256 sums for everything in the release dir.
          ( cd "$OUT" && sha256sum * > "openlitter-${TAG}-SHA256SUMS.txt" )

          echo "Artifacts:"
          ls -lh "$OUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.stage.outputs.tag }}
          name: OpenLitter ${{ steps.stage.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            release/*
